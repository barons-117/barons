<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>תכנית האימונים | KY-GYM</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f4f2;
  --surface: #ffffff;
  --surface2: #f0f0ee;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.18);
  --red: #D62839;
  --red-dim: rgba(214,40,57,0.08);
  --red-light: rgba(214,40,57,0.12);
  --green: #1e8a4c;
  --text: #111;
  --muted: #888;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
}
html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'Heebo',sans-serif; direction:rtl; -webkit-tap-highlight-color:transparent; }
button { font-family:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent; }
input, textarea, select { font-family:inherit; direction:rtl; background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text); outline:none; }
input:focus, textarea:focus, select:focus { border-color:var(--red); }

/* HEADER */
.header {
  background:#fff; border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
  padding:0 14px; position:sticky; top:0; z-index:100;
  display:flex; align-items:center; gap:8px; height:52px;
}
.logo { font-size:19px; font-weight:900; color:var(--red); flex-shrink:0; letter-spacing:1px; }
.tabs { display:flex; gap:3px; flex:1; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:5px 12px; border:none; border-radius:20px; background:transparent; color:var(--muted); font-size:12px; font-weight:600; white-space:nowrap; flex-shrink:0; }
.tab.active { background:var(--red); color:#fff; }
.trainer-btn { padding:5px 11px; border-radius:20px; font-size:11px; font-weight:700; border:1px solid var(--border); background:transparent; color:var(--muted); white-space:nowrap; flex-shrink:0; }
.trainer-btn.on { background:rgba(255,170,0,.1); border-color:rgba(200,130,0,.35); color:#b07000; }

/* CONTENT */
.content { padding:12px; max-width:860px; margin:0 auto; }

/* PLAN HEADER */
.plan-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:8px; flex-wrap:wrap; }
.plan-title { font-size:16px; font-weight:900; }
.plan-sub { font-size:10px; color:var(--muted); margin-top:1px; }

/* PLAN LAYOUT - desktop */
.plan-layout { display:grid; grid-template-columns:152px 1fr; gap:12px; }

/* SIDEBAR - desktop */
.cat-sidebar { display:flex; flex-direction:column; gap:4px; }
.cat-btn {
  display:flex; align-items:center; gap:7px;
  padding:9px 10px; border:1px solid var(--border); border-radius:10px;
  background:var(--surface); color:var(--muted); font-size:11px; font-weight:500;
  width:100%; text-align:right; box-shadow:var(--shadow); transition:all .15s;
}
.cat-btn:hover { border-color:var(--border2); color:var(--text); }
.cat-btn.active { background:var(--red); border-color:var(--red); color:#fff; font-weight:700; box-shadow:0 2px 8px rgba(214,40,57,.25); }
.cat-count { margin-right:auto; font-size:10px; background:rgba(0,0,0,.07); border-radius:8px; padding:1px 6px; }
.cat-btn.active .cat-count { background:rgba(255,255,255,.25); color:#fff; }

/* MOBILE layout - MUST come after base styles */
@media(max-width:600px){
  .plan-layout { grid-template-columns:1fr; gap:8px; }
  .cat-sidebar {
    flex-direction:row !important;
    overflow-x:auto; gap:6px; padding-bottom:6px;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .cat-sidebar::-webkit-scrollbar { display:none; }
  .cat-btn {
    flex-direction:column !important;
    gap:3px; padding:8px 14px;
    white-space:nowrap; flex-shrink:0;
    width:auto !important; min-width:60px;
    border-radius:12px; align-items:center;
  }
  .cat-btn .cat-label { font-size:10px; }
  .cat-count { margin-right:0 !important; }
}

/* EXERCISE CARD */
.ex-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; box-shadow:var(--shadow); overflow:hidden; }
.ex-header { display:flex; align-items:center; gap:8px; padding:10px 12px; }
.machine-badge { background:var(--red); color:#fff; font-weight:900; min-width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px; }
.machine-img { width:44px; height:44px; border-radius:7px; object-fit:cover; border:1px solid var(--border); flex-shrink:0; }
.machine-img-ph { width:44px; height:44px; border-radius:7px; border:1px dashed var(--border2); display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; flex-shrink:0; }
.ex-info { flex:1; min-width:0; cursor:pointer; }
.ex-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.ex-name-input { font-size:13px; font-weight:700; border-color:var(--red); padding:3px 7px; width:100%; }
.ex-meta { font-size:10px; color:var(--muted); margin-top:2px; }

/* WEIGHT INPUT */
.wval-input {
  font-size:16px; font-weight:900; width:64px; text-align:center;
  padding:5px 4px; border-color:var(--border2);
  background:var(--surface2);
}
.wval-input:focus { border-color:var(--red); }
.wunit-label { font-size:10px; color:var(--muted); text-align:center; margin-top:2px; }
.chevron { font-size:9px; color:var(--muted); cursor:pointer; padding:6px 4px; flex-shrink:0; transition:transform .2s; }

/* EX BODY */
.ex-body { padding:0 12px 12px; border-top:1px solid var(--border); background:#fafafa; }
.field-grid { display:grid; gap:8px; margin-top:10px; }
.fg-3 { grid-template-columns:1fr 1fr 1fr; }
.fg-2 { grid-template-columns:1fr 1fr; }
@media(max-width:460px){ .fg-3 { grid-template-columns:1fr 1fr; } }
.field-label { font-size:10px; color:var(--muted); margin-bottom:3px; font-weight:700; }
.field-val { font-size:13px; padding:5px 0; color:var(--text); }
.field-input { padding:7px 9px; font-size:13px; width:100%; }

.note-item { background:#fff8f0; border-right:3px solid var(--red); border-radius:0 7px 7px 0; padding:7px 9px; margin-bottom:5px; font-size:12px; line-height:1.5; color:var(--text); }
.note-date { font-size:10px; color:var(--muted); margin-top:2px; }

/* BUTTONS */
.btn-red { background:var(--red); color:#fff; border:none; padding:9px 18px; border-radius:9px; font-size:13px; font-weight:700; }
.btn-red:active { opacity:.8; }
.btn-outline { background:#fff; color:var(--muted); border:1px solid var(--border); padding:7px 12px; border-radius:8px; font-size:12px; box-shadow:var(--shadow); }
.btn-outline:active { background:var(--surface2); }
.add-ex-btn { display:flex; align-items:center; justify-content:center; gap:7px; padding:12px; border:1.5px dashed #ccc; border-radius:10px; background:transparent; color:var(--muted); font-size:13px; width:100%; margin-top:6px; }
.add-ex-btn:active { border-color:var(--red); color:var(--red); }

.divider { border-top:1px solid var(--border); margin:10px 0; }
.row { display:flex; gap:7px; flex-wrap:wrap; }
.section-label { font-size:13px; font-weight:900; margin-bottom:8px; display:flex; align-items:center; gap:7px; color:var(--text); }
.cat-dot { width:6px; height:6px; border-radius:50%; background:var(--red); flex-shrink:0; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; z-index:1000; }
@media(min-width:500px){ .modal-overlay { align-items:center; padding:14px; } }
.modal { background:#fff; border-radius:18px 18px 0 0; padding:22px; width:100%; max-width:440px; max-height:90vh; overflow-y:auto; border:1px solid var(--border); }
@media(min-width:500px){ .modal { border-radius:16px; } }
.modal-title { font-size:16px; font-weight:900; margin-bottom:14px; color:var(--text); }

/* MEMBERSHIP */
.mem-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:14px; box-shadow:var(--shadow); }
.mem-big { font-size:54px; font-weight:900; line-height:1; color:var(--red); }
.progress-bar { background:#e8e8e8; border-radius:6px; height:5px; margin-top:8px; }
.progress-fill { background:var(--red); border-radius:6px; height:5px; transition:width .5s; }
.dot-grid { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
.dot { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.dot.used { background:var(--red); color:#fff; }
.dot.avail { background:#f0f0f0; border:1px solid #ddd; color:#aaa; }
.session-row { display:flex; align-items:center; gap:9px; padding:9px 0; border-bottom:1px solid var(--border); }
.session-num { background:var(--red-light); color:var(--red); border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }

/* ARCHIVE */
.archive-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; box-shadow:var(--shadow); }
.hist-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; }

/* MISC */
.empty { text-align:center; padding:50px 20px; color:var(--muted); }
.empty-icon { font-size:44px; margin-bottom:10px; }
.pill-select { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.pill { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:#fff; color:var(--muted); font-size:12px; font-weight:700; cursor:pointer; }
.pill.sel { background:var(--red); color:#fff; border-color:var(--red); }
.saving-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; margin-left:4px; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.offline-bar { background:#fff0f0; border-bottom:1px solid #fcc; text-align:center; padding:6px; font-size:12px; color:#c00; display:none; }
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:2000; display:flex; align-items:center; justify-content:center; cursor:zoom-out; }
.lightbox img { max-width:92vw; max-height:88vh; border-radius:10px; object-fit:contain; }
.lightbox-close { position:fixed; top:14px; left:14px; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.15); border:none; color:#fff; font-size:22px; cursor:pointer; }
.loading-screen { display:flex; align-items:center; justify-content:center; min-height:70vh; flex-direction:column; gap:12px; color:var(--muted); }
.spinner { font-size:36px; animation:spin 1.2s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="offline-bar" class="offline-bar">⚠️ אין חיבור — שינויים לא יישמרו</div>
<div id="app"><div class="loading-screen"><div class="spinner">🏋</div><div>טוען...</div></div></div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, update, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyCNkfifRX7zgHcIXmAuB0HSSzCfCzsFKjk",
  authDomain:"shopping-list-855d8.firebaseapp.com",
  databaseURL:"https://shopping-list-855d8-default-rtdb.firebaseio.com",
  projectId:"shopping-list-855d8",
  storageBucket:"shopping-list-855d8.firebasestorage.app",
  messagingSenderId:"467214739172",
  appId:"1:467214739172:web:1c1e46e9072352197f2ef1"
}));
const BASE  = 'gymTracker';
const dbRef = p => ref(db, `${BASE}/${p}`);

const CATS = [
  {label:'חזה',emoji:'🏋'},{label:'גב',emoji:'💪'},{label:'כתפיים',emoji:'🎯'},
  {label:'רגליים',emoji:'🦵'},{label:'יד קדמית',emoji:'💪'},{label:'יד אחורית',emoji:'🔱'},
  {label:'בטן וגב תחתון',emoji:'⚡'},{label:'אירובי',emoji:'🏃'},
];
const CAT_LABELS = CATS.map(c=>c.label);
const uid    = ()=>'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const nowStr = ()=>new Date().toLocaleString('he-IL',{dateStyle:'short',timeStyle:'short'});
const today  = ()=>new Date().toLocaleDateString('he-IL');
const timeNow= ()=>new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
const esc    = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let S = {
  plan:null, archive:{}, history:{}, membership:null,
  tab:'plan', cat:CAT_LABELS[0],
  trainer:false, open:{}, modal:null, saving:false,
  editingName:null,
};

/* Firebase */
async function fbSet(p,v)  { S.saving=true; hdr(); try{await set(dbRef(p),v);}catch(e){alert('שגיאה: '+e.message);} S.saving=false; hdr(); }
async function fbMerge(p,v){ S.saving=true; hdr(); try{await update(dbRef(p),v);}catch(e){alert('שגיאה: '+e.message);} S.saving=false; hdr(); }

onValue(ref(db,BASE), snap=>{
  const d=snap.val()||{};
  S.plan=d.currentPlan||null; S.archive=d.archive||{};
  S.history=d.history||{}; S.membership=d.membership||null;
  render();
});
window.addEventListener('online', ()=>{document.getElementById('offline-bar').style.display='none';});
window.addEventListener('offline',()=>{document.getElementById('offline-bar').style.display='block';});

/* Actions */
async function createPlan(name){
  if(S.plan) await fbSet(`archive/plan_${Date.now()}`,{...S.plan,archivedAt:nowStr()});
  await fbSet('currentPlan',{id:uid(),name,createdAt:nowStr(),exercises:Object.fromEntries(CAT_LABELS.map(l=>[l,{}]))});
  S.modal=null; S.cat=CAT_LABELS[0]; S.open={};
}
async function addExercise(cat){
  const id=uid();
  await fbSet(`currentPlan/exercises/${cat}/${id}`,{id,machineNumber:'',machineImage:'',adjustment:'',name:'תרגיל חדש',description:'',reps:'12',sets:3,rest:60,weight:'0',weightStep:'2.5',trainerNotes:{}});
}
async function upField(cat,id,field,val){ await fbMerge(`currentPlan/exercises/${cat}/${id}`,{[field]:val}); }
async function delExercise(cat,id){ if(!confirm('למחוק?'))return; await fbSet(`currentPlan/exercises/${cat}/${id}`,null); }
async function saveWeight(cat,id,val){
  const v=String(val).trim(); if(!v)return;
  await fbMerge(`currentPlan/exercises/${cat}/${id}`,{weight:v});
  const ex=S.plan?.exercises?.[cat]?.[id];
  if(ex) await fbSet(`history/h_${Date.now()}`,{exerciseId:id,exerciseName:ex.name,planId:S.plan?.id,weight:v,date:today(),time:timeNow()});
}
async function addNote(cat,id,text){
  await fbSet(`currentPlan/exercises/${cat}/${id}/trainerNotes/n_${Date.now()}`,{text,date:nowStr()});
  S.modal=null;
}
async function createMembership(total){ await fbSet('membership',{id:uid(),total:parseInt(total),purchasedAt:today(),sessions:{}}); S.modal=null; }
async function markSession(date,t){ await fbSet(`membership/sessions/s_${Date.now()}`,{date,time:t}); S.modal=null; }

/* Render */
let _focusId=null;
function render(){
  document.getElementById('app').innerHTML=page();
  bindImg();
  if(_focusId){ const el=document.getElementById(_focusId); if(el){el.focus();if(el.select)el.select();} _focusId=null; }
}
function hdr(){ const el=document.getElementById('hdr-dyn'); if(el)el.innerHTML=hdrDyn(); }

function page(){ return `<div>
  <header class="header">
    <div class="logo">KY-GYM</div>
    <div id="hdr-dyn" style="display:contents">${hdrDyn()}</div>
  </header>
  <div class="content">
    ${S.tab==='plan'?planTab():''}
    ${S.tab==='membership'?memTab():''}
    ${S.tab==='archive'?archiveTab():''}
  </div>
  ${S.modal?modalOverlay():''}
</div>`; }

function hdrDyn(){ return `
  <div class="tabs">
    ${[['plan','💪 תכנית'],['membership','🎫 כרטיסייה'],['archive','📁 ארכיון']].map(([t,l])=>
      `<button class="tab${S.tab===t?' active':''}" onclick="GT.tab('${t}')">${l}</button>`).join('')}
  </div>
  <span style="font-size:10px;color:var(--muted)">${S.saving?'<span class="saving-dot"></span>':''}</span>
  <button class="trainer-btn${S.trainer?' on':''}" onclick="GT.trainer()">${S.trainer?'✏️ מאמנת':'🔒 צפייה'}</button>`; }

/* Plan tab */
function planTab(){
  if(!S.plan) return `<div class="empty"><div class="empty-icon">💪</div>
    <p style="font-size:16px;font-weight:900;margin-bottom:8px">אין תכנית פעילה</p>
    <p style="margin-bottom:18px;font-size:13px;color:var(--muted)">צור תכנית אימונים כדי להתחיל</p>
    <button class="btn-red" onclick="GT.modal('newPlan')">+ תכנית חדשה</button></div>`;

  const cat=S.cat;
  const exArr=Object.values(S.plan.exercises?.[cat]||{}).filter(Boolean);
  return `
    <div class="plan-hdr">
      <div><div class="plan-title">${esc(S.plan.name)}</div><div class="plan-sub">נוצרה: ${S.plan.createdAt}</div></div>
      ${S.trainer?`<button class="btn-red" style="font-size:11px;padding:6px 12px" onclick="GT.modal('newPlan')">תכנית חדשה →</button>`:''}
    </div>
    <div class="plan-layout">
      <div class="cat-sidebar">
        ${CATS.map(c=>{
          const n=Object.values(S.plan.exercises?.[c.label]||{}).filter(Boolean).length;
          const active=cat===c.label;
          return `<button class="cat-btn${active?' active':''}" onclick="GT.cat('${c.label}')">
            <span style="font-size:16px">${c.emoji}</span>
            <span class="cat-label" style="flex:1;text-align:right">${c.label}</span>
            ${n?`<span class="cat-count">${n}</span>`:''}
          </button>`;
        }).join('')}
      </div>
      <div>
        <div class="section-label"><div class="cat-dot"></div>${cat}</div>
        ${exArr.length===0&&!S.trainer?'<div style="color:var(--muted);font-size:13px;padding:16px 0;text-align:center">אין תרגילים בקטגוריה זו</div>':''}
        ${exArr.map(ex=>exCard(ex,cat)).join('')}
        ${S.trainer?`<button class="add-ex-btn" onclick="GT.addEx('${cat}')">+ הוסף תרגיל</button>`:''}
      </div>
    </div>`;
}

function exCard(ex,cat){
  const open=S.open[ex.id];
  const hist=Object.values(S.history||{}).filter(h=>h.exerciseId===ex.id)
    .sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  const last=hist[0]?.date||'';
  const tm=S.trainer;
  const editingN=S.editingName===ex.id;
  const numSz=(ex.machineNumber||'').length>2?'font-size:10px':'';

  const imgEl=ex.machineImage
    ? tm
      ? `<div style="position:relative;flex-shrink:0;width:44px">
           <img src="${esc(ex.machineImage)}" class="machine-img" style="cursor:zoom-in;width:44px;height:44px" data-lightbox="${esc(ex.machineImage)}" data-img-ex="${ex.id}" data-img-cat="${cat}" alt="">
           <button onclick="GT.delImg('${cat}','${ex.id}');event.stopPropagation()" title="מחק תמונה"
             style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);border:2px solid #fff;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1;cursor:pointer;padding:0">×</button>
         </div>`
      : `<img src="${esc(ex.machineImage)}" class="machine-img" style="cursor:zoom-in" data-lightbox="${esc(ex.machineImage)}" alt="">`
    : tm?`<div class="machine-img-ph" data-img-ex="${ex.id}" data-img-cat="${cat}">📷</div>`:'';

  const nameEl=tm&&editingN
    ?`<input class="ex-name-input field-input" id="ninput_${ex.id}" value="${esc(ex.name)}"
        onblur="GT.saveName('${cat}','${ex.id}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()"
        onclick="event.stopPropagation()">`
    :`<div class="ex-name"${tm?` onclick="GT.editN('${ex.id}');event.stopPropagation()" title="לחץ לעריכה"`:''}>
        ${esc(ex.name)}${tm?' <span style="color:var(--muted);font-weight:400;font-size:11px">✎</span>':''}
      </div>`;

  return `<div class="ex-card">
    <div class="ex-header">
      <div class="machine-badge" style="${numSz}">${esc(ex.machineNumber||'#')}</div>
      ${imgEl}
      <div class="ex-info" onclick="GT.open('${ex.id}')">
        ${nameEl}
        <div class="ex-meta">${ex.sets} סטים × ${ex.reps} חז׳ · ${ex.rest}″${last?' · '+last:''}</div>
      </div>
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px">
        <input class="wval-input" type="text" inputmode="decimal" value="${esc(String(ex.weight??0))}"
          onfocus="this.select()"
          onblur="GT.saveWt('${cat}','${ex.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          onclick="event.stopPropagation()">
        ${tm
          ? `<select style="font-size:10px;color:var(--muted);border:none;background:transparent;text-align:center;cursor:pointer;padding:0;outline:none;direction:rtl;width:64px"
               onchange="GT.up('${cat}','${ex.id}','weightUnit',this.value)" onclick="event.stopPropagation()">
               ${['ק\"ג','פלטות','ערך'].map(u=>`<option value="${u}"${(ex.weightUnit||'ערך')===u?' selected':''} >${u}</option>`).join('')}
             </select>`
          : `<div class="wunit-label">${ex.weightUnit||'ערך'}</div>`}
      </div>
      <div class="chevron" onclick="GT.open('${ex.id}')" style="transform:${open?'rotate(180deg)':'none'}">▼</div>
    </div>
    ${open?exBody(ex,cat,hist):''}
  </div>`;
}

function exBody(ex,cat,hist){
  const tm=S.trainer;

  return `<div class="ex-body">
    <div class="field-grid fg-2">
      <div><div class="field-label">מס׳ מכשיר</div>
        ${tm?`<input class="field-input" value="${esc(ex.machineNumber)}" placeholder="19" onchange="GT.up('${cat}','${ex.id}','machineNumber',this.value)">`:`<div class="field-val">${esc(ex.machineNumber)||'—'}</div>`}
      </div>
      <div><div class="field-label">כיוונון</div>
        ${tm?`<input class="field-input" value="${esc(ex.adjustment)}" placeholder="גובה 3" onchange="GT.up('${cat}','${ex.id}','adjustment',this.value)">`:`<div class="field-val">${esc(ex.adjustment)||'—'}</div>`}
      </div>

    </div>
    <div class="field-grid fg-3" style="margin-top:7px">
      <div><div class="field-label">סטים</div>
        ${tm?`<input class="field-input" type="number" min="1" value="${ex.sets}" onchange="GT.up('${cat}','${ex.id}','sets',parseInt(this.value)||3)">`:`<div class="field-val">${ex.sets}</div>`}
      </div>
      <div><div class="field-label">חזרות</div>
        ${tm?`<input class="field-input" value="${esc(ex.reps)}" onchange="GT.up('${cat}','${ex.id}','reps',this.value)">`:`<div class="field-val">${ex.reps}</div>`}
      </div>
      <div><div class="field-label">מנוחה (שנ׳)</div>
        ${tm?`<input class="field-input" type="number" value="${ex.rest}" onchange="GT.up('${cat}','${ex.id}','rest',parseInt(this.value)||60)">`:`<div class="field-val">${ex.rest}″</div>`}
      </div>
    </div>
    <div style="margin-top:8px"><div class="field-label">הוראות / מה לשים לב</div>
      ${tm?`<textarea class="field-input" rows="2" style="resize:vertical;margin-top:3px" onchange="GT.up('${cat}','${ex.id}','description',this.value)">${esc(ex.description)}</textarea>`
          :ex.description?`<div class="field-val" style="line-height:1.6;color:#555">${esc(ex.description)}</div>`:''}
    </div>
    ${notes.length?`<div style="margin-top:10px">
      <div class="field-label" style="margin-bottom:5px">הערות מאמנת</div>
      ${notes.map(n=>`<div class="note-item"><div>${esc(n.text)}</div><div class="note-date">${n.date}</div></div>`).join('')}
    </div>`:''}
    <div class="divider"></div>
    <div class="row">
      <button class="btn-outline" onclick="GT.hist('${ex.id}','${esc(ex.name)}')">📊 היסטוריה (${hist.length})</button>
      <button class="btn-outline" onclick="GT.modal('note','${cat}','${ex.id}')">📝 הערה</button>
      ${tm?`<button class="btn-outline" style="color:var(--red);border-color:rgba(214,40,57,.25)" onclick="GT.del('${cat}','${ex.id}')">🗑 מחק</button>`:''}
    </div>
  </div>`;
}

/* Membership */
function memTab(){
  const m=S.membership;
  if(!m) return `<div class="empty"><div class="empty-icon">🎫</div>
    <p style="font-size:16px;font-weight:900;margin-bottom:8px">אין כרטיסייה פעילה</p>
    <p style="margin-bottom:18px;font-size:13px;color:var(--muted)">הוסף כרטיסייה לעקוב אחרי השיעורים שלך</p>
    <button class="btn-red" onclick="GT.modal('newMembership')">+ כרטיסייה חדשה</button></div>`;

  const sess=Object.values(m.sessions||{}).sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  const used=sess.length, total=m.total, rem=total-used, pct=Math.min(100,(used/total)*100);
  return `
    <div class="plan-hdr">
      <div><div class="plan-title">כרטיסייה</div><div class="plan-sub">נרכשה: ${m.purchasedAt}</div></div>
      <div class="row">
        <button class="btn-outline" style="font-size:11px" onclick="GT.modal('newMembership')">+ חדשה</button>
        ${rem>0?`<button class="btn-red" style="font-size:11px" onclick="GT.modal('markSession')">✓ סמן אימון</button>`:''}
      </div>
    </div>
    <div class="mem-card">
      <div style="display:flex;align-items:baseline;gap:10px">
        <div class="mem-big">${rem}</div>
        <div style="color:var(--muted);font-size:14px">נותרו מתוך ${total}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${used} שיעורים בוצעו</div>
      <div class="dot-grid">${Array.from({length:total}).map((_,i)=>`<div class="dot ${i<used?'used':'avail'}">${i<used?'✓':i+1}</div>`).join('')}</div>
    </div>
    ${rem===0?`<div style="background:#fff3f3;border:1px solid #fcc;border-radius:10px;padding:10px 14px;margin-bottom:14px;text-align:center;color:var(--red);font-weight:700">הכרטיסייה נגמרה! 🎉</div>`:''}
    <div class="section-label"><div class="cat-dot"></div>היסטוריית אימונים</div>
    ${sess.length===0?'<div style="color:var(--muted);font-size:13px;padding:12px 0;text-align:center">עדיין לא נרשמו אימונים</div>':''}
    ${sess.map((s,i)=>`<div class="session-row">
      <div class="session-num">${used-i}</div>
      <div style="flex:1"><div style="font-weight:600;font-size:13px">${s.date}</div><div style="font-size:11px;color:var(--muted)">${s.time}</div></div>
      <div style="font-size:12px;color:var(--green);font-weight:700">✓ בוצע</div>
    </div>`).join('')}`;
}

/* Archive */
function archiveTab(){
  const plans=Object.values(S.archive||{}).sort((a,b)=>(b.archivedAt||'').localeCompare(a.archivedAt||''));
  if(!plans.length) return `<div class="empty"><div class="empty-icon">📁</div>
    <p style="font-size:16px;font-weight:900;margin-bottom:8px">הארכיון ריק</p>
    <p style="font-size:13px;color:var(--muted)">תכניות ישנות יופיעו כאן</p></div>`;
  return `<div class="plan-title" style="margin-bottom:12px">ארכיון (${plans.length})</div>
    ${plans.map((p,pi)=>{
      const o=S.open['arc_'+pi];
      return `<div class="archive-card">
        <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="GT.arcOpen(${pi})">
          <div><div style="font-weight:700;font-size:14px">${esc(p.name)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:1px">${p.createdAt} → ${p.archivedAt||'—'}</div></div>
          <div style="color:var(--muted);font-size:9px;transform:${o?'rotate(180deg)':'none'}">▼</div>
        </div>
        ${o?CATS.map(c=>{
          const exs=Object.values(p.exercises?.[c.label]||{}).filter(Boolean);
          if(!exs.length)return '';
          return `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
            <div style="font-weight:700;font-size:12px;color:var(--red);margin-bottom:5px">${c.label}</div>
            ${exs.map(ex=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
              <span>${ex.machineNumber?`[${ex.machineNumber}] `:''}${esc(ex.name)}</span>
              <span style="color:var(--muted)">${ex.weight} · ${ex.sets}×${ex.reps}</span>
            </div>`).join('')}
          </div>`;
        }).join(''):''}
      </div>`;
    }).join('')}`;
}

/* Modals */
function modalOverlay(){
  const m=S.modal; let inner='';
  if(m.type==='newPlan')        inner=modalNewPlan();
  else if(m.type==='newMembership') inner=modalNewMem();
  else if(m.type==='markSession')   inner=modalMarkSess();
  else if(m.type==='history')       inner=modalHist();
  else if(m.type==='note')          inner=modalNote();
  return `<div class="modal-overlay" id="moverlay" onclick="if(event.target.id==='moverlay')GT.closeModal()"><div class="modal">${inner}</div></div>`;
}
function modalNewPlan(){
  const def='תכנית '+new Date().toLocaleDateString('he-IL',{month:'long',year:'numeric'});
  return `<div class="modal-title">תכנית חדשה</div>
    ${S.plan?`<div style="background:#fff3f3;border:1px solid #fcc;border-radius:8px;padding:9px 11px;margin-bottom:12px;font-size:12px;color:var(--red)">⚠️ התכנית הנוכחית תועבר לארכיון</div>`:''}
    <div class="field-label">שם התכנית</div>
    <input class="field-input" id="planName" value="${esc(def)}" style="margin-bottom:14px;width:100%">
    <div class="row"><button class="btn-red" onclick="GT.doCreatePlan()">צור תכנית</button><button class="btn-outline" onclick="GT.closeModal()">ביטול</button></div>`;
}
function modalNewMem(){
  const cur=S.modal.total||11;
  return `<div class="modal-title">כרטיסייה חדשה</div>
    <div class="field-label" style="margin-bottom:6px">כמה שיעורים בכרטיסייה?</div>
    <input class="field-input" id="memTotal" type="number" min="1" value="${cur}" style="margin-bottom:6px;width:100%;font-size:22px;font-weight:700;text-align:center;padding:10px">
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px;text-align:center">הכנס כל מספר שתרצה</div>
    <div class="row"><button class="btn-red" onclick="GT.doCreateMem()">שמור</button><button class="btn-outline" onclick="GT.closeModal()">ביטול</button></div>`;
}
function modalMarkSess(){
  return `<div class="modal-title">סמן אימון</div>
    <div class="field-grid fg-2" style="margin-bottom:14px">
      <div><div class="field-label">תאריך</div><input class="field-input" id="sessDate" value="${today()}" style="width:100%"></div>
      <div><div class="field-label">שעה</div><input class="field-input" id="sessTime" value="${timeNow()}" style="width:100%"></div>
    </div>
    <div class="row"><button class="btn-red" onclick="GT.doMarkSess()">✓ אשר</button><button class="btn-outline" onclick="GT.closeModal()">ביטול</button></div>`;
}
function modalHist(){
  const {exId,exName}=S.modal;
  const items=Object.values(S.history||{}).filter(h=>h.exerciseId===exId)
    .sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  return `<div class="modal-title">📊 ${esc(exName)}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">${items.length} רשומות</div>
    ${items.length===0?`<p style="color:var(--muted);font-size:13px;text-align:center;padding:18px 0">אין היסטוריה עדיין</p>`:
      items.map((h,i)=>{
        const diff=i<items.length-1?String(h.weight)!==String(items[i+1].weight)?`${h.weight} ← ${items[i+1].weight}`:null:null;
        return `<div class="hist-row">
          <div><div style="font-weight:700;font-size:15px;color:var(--text)">${h.weight}</div><div style="font-size:10px;color:var(--muted)">${h.date} · ${h.time}</div></div>
          ${diff?`<div style="font-size:11px;color:var(--green)">▲ שינוי</div>`:'<div></div>'}
        </div>`;
      }).join('')}
    <button class="btn-outline" style="margin-top:12px;width:100%" onclick="GT.closeModal()">סגור</button>`;
}
function modalNote(){
  return `<div class="modal-title">📝 הוסף הערה</div>
    <textarea class="field-input" id="noteText" rows="3" style="margin-bottom:14px;resize:vertical;width:100%" placeholder="העלה משקל בשבוע הבא..."></textarea>
    <div class="row"><button class="btn-red" onclick="GT.doNote()">שמור</button><button class="btn-outline" onclick="GT.closeModal()">ביטול</button></div>`;
}

/* Image upload */
function bindImg(){
  // Lightbox for all images with data-lightbox
  document.querySelectorAll('[data-lightbox]').forEach(el=>{
    el.addEventListener('click', e=>{
      if(el.dataset.imgEx) return; // trainer mode — upload handles it
      e.stopPropagation();
      showLightbox(el.dataset.lightbox);
    });
  });
  // Upload for trainer images
  document.querySelectorAll('[data-img-ex]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const exId=el.dataset.imgEx, cat=el.dataset.imgCat;
      // if it's an existing image, show lightbox AND offer upload via long-press? 
      // Simple: single tap = lightbox, they can remove & re-add. But trainer wants to replace.
      // Solution: show lightbox first, with a "החלף תמונה" button inside
      if(el.tagName==='IMG'){
        showLightbox(el.src, ()=>triggerUpload(cat,exId));
        return;
      }
      triggerUpload(cat,exId);
    });
  });
}
function triggerUpload(cat,exId){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    if(f.size>500*1024){alert('תמונה גדולה מדי — עד 500KB');return;}
    const r=new FileReader();
    r.onload=ev=>upField(cat,exId,'machineImage',ev.target.result);
    r.readAsDataURL(f);
  };
  inp.click();
}
function showLightbox(src, onReplace){
  const lb=document.createElement('div');
  lb.className='lightbox';
  lb.innerHTML=`
    <button class="lightbox-close" title="סגור">×</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px" onclick="event.stopPropagation()">
      <img src="${src}" alt="">
      ${onReplace?`<button style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 18px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit" id="lb-replace">📷 החלף תמונה</button>`:''}
    </div>`;
  lb.addEventListener('click', ()=>lb.remove());
  lb.querySelector('.lightbox-close').addEventListener('click', ()=>lb.remove());
  if(onReplace) lb.querySelector('#lb-replace')?.addEventListener('click', ()=>{ lb.remove(); onReplace(); });
  document.body.appendChild(lb);
}

/* GT */
window.GT = {
  tab:     t  => { S.tab=t; render(); },
  trainer: () => { S.trainer=!S.trainer; render(); },
  cat:     c  => { S.cat=c; render(); },
  open:    id => { S.open[id]=!S.open[id]; render(); },
  arcOpen: i  => { S.open['arc_'+i]=!S.open['arc_'+i]; render(); },
  modal:   (type,cat,exId) => { S.modal={type,cat,exId,total:11}; render(); setTimeout(()=>document.getElementById('noteText')?.focus(),60); },
  closeModal: () => { S.modal=null; render(); },
  hist:    (id,name) => { S.modal={type:'history',exId:id,exName:name}; render(); },

  addEx:   cat      => addExercise(cat),
  del:     (c,id)   => delExercise(c,id),
  up:      (c,id,f,v)=> upField(c,id,f,v),
  saveWt:  (c,id,v) => saveWeight(c,id,v),

  editN:   id       => { S.editingName=id; _focusId='ninput_'+id; render(); },
  saveName:(c,id,v) => { S.editingName=null; upField(c,id,'name',v.trim()||'תרגיל'); },
  delImg:  (c,id)   => upField(c,id,'machineImage',''),

  doCreatePlan: () => { const n=document.getElementById('planName')?.value?.trim(); if(n)createPlan(n); },
  memTotal: n => { S.modal={...S.modal,total:n}; render(); },
  doCreateMem: () => { const t=parseInt(document.getElementById('memTotal')?.value)||S.modal.total||10; createMembership(t); },
  doMarkSess: () => { markSession(document.getElementById('sessDate')?.value||today(), document.getElementById('sessTime')?.value||timeNow()); },
  doNote: () => { const t=document.getElementById('noteText')?.value?.trim(); if(t&&S.modal)addNote(S.modal.cat,S.modal.exId,t); },
};
</script>
