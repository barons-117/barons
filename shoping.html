<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשימת קניות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --paper: #fffef9;
    --ink: #2a2118;
    --muted: #9e8e78;
    --line: #ede8df;
    --veggie: #4a7c59;
    --veggie-bg: #eef6f0;
    --frozen: #3a6f8f;
    --frozen-bg: #e8f3f9;
    --drinks: #8b5e3c;
    --drinks-bg: #faf0e8;
    --dairy: #c0884a;
    --dairy-bg: #fdf5e8;
    --snacks: #b85252;
    --snacks-bg: #fdf0f0;
    --clean: #6b5fa5;
    --clean-bg: #f2f0fa;
    --other: #5a7080;
    --other-bg: #eef2f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Heebo', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
    background-image: 
      radial-gradient(ellipse at 80% 10%, rgba(74,124,89,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 90%, rgba(139,94,60,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 32px 0 28px;
    position: relative;
  }

  .header-emoji {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }

  .subtitle {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .progress-bar-wrap {
    max-width: 320px;
    margin: 18px auto 0;
    background: var(--line);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--veggie), var(--dairy));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .progress-label {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 500;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  .category {
    background: var(--paper);
    border-radius: 20px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
    transition: box-shadow 0.2s;
  }

  .category:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px 14px;
    border-bottom: 1.5px solid var(--line);
  }

  .cat-icon {
    font-size: 22px;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .cat-title {
    font-size: 1rem;
    font-weight: 700;
    flex: 1;
  }

  .cat-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    opacity: 0.85;
  }

  /* Category colors */
  .veggie .cat-icon { background: var(--veggie-bg); }
  .veggie .cat-title { color: var(--veggie); }
  .veggie .cat-badge { background: var(--veggie-bg); color: var(--veggie); }

  .frozen .cat-icon { background: var(--frozen-bg); }
  .frozen .cat-title { color: var(--frozen); }
  .frozen .cat-badge { background: var(--frozen-bg); color: var(--frozen); }

  .drinks .cat-icon { background: var(--drinks-bg); }
  .drinks .cat-title { color: var(--drinks); }
  .drinks .cat-badge { background: var(--drinks-bg); color: var(--drinks); }

  .dairy .cat-icon { background: var(--dairy-bg); }
  .dairy .cat-title { color: var(--dairy); }
  .dairy .cat-badge { background: var(--dairy-bg); color: var(--dairy); }

  .snacks .cat-icon { background: var(--snacks-bg); }
  .snacks .cat-title { color: var(--snacks); }
  .snacks .cat-badge { background: var(--snacks-bg); color: var(--snacks); }

  .clean .cat-icon { background: var(--clean-bg); }
  .clean .cat-title { color: var(--clean); }
  .clean .cat-badge { background: var(--clean-bg); color: var(--clean); }

  .other .cat-icon { background: var(--other-bg); }
  .other .cat-title { color: var(--other); }
  .other .cat-badge { background: var(--other-bg); color: var(--other); }

  .item-list {
    padding: 8px 0;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid transparent;
    user-select: none;
  }

  .item:not(:last-child) {
    border-bottom-color: var(--line);
  }

  .item:hover {
    background: rgba(0,0,0,0.02);
  }

  .item:active {
    background: rgba(0,0,0,0.04);
  }

  /* Custom checkbox */
  .item input[type="checkbox"] {
    display: none;
  }

  .checkmark {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--line);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    background: white;
  }

  .checkmark svg {
    width: 12px;
    height: 12px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
  }

  .item.done .checkmark {
    background: var(--accent, #4a7c59);
    border-color: var(--accent, #4a7c59);
  }

  .item.done .checkmark svg {
    opacity: 1;
    transform: scale(1);
  }

  .item-text {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--ink);
    transition: all 0.25s;
    line-height: 1.4;
  }

  .item.done .item-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-thickness: 1.5px;
  }

  /* Category accent colors for checkmarks */
  .veggie .item.done .checkmark { background: var(--veggie); border-color: var(--veggie); }
  .frozen .item.done .checkmark { background: var(--frozen); border-color: var(--frozen); }
  .drinks .item.done .checkmark { background: var(--drinks); border-color: var(--drinks); }
  .dairy .item.done .checkmark { background: var(--dairy); border-color: var(--dairy); }
  .snacks .item.done .checkmark { background: var(--snacks); border-color: var(--snacks); }
  .clean .item.done .checkmark { background: var(--clean); border-color: var(--clean); }
  .other .item.done .checkmark { background: var(--other); border-color: var(--other); }

  .reset-btn {
    display: block;
    margin: 24px auto 0;
    padding: 12px 32px;
    border: 2px solid var(--line);
    border-radius: 99px;
    background: white;
    color: var(--muted);
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--muted);
    color: var(--ink);
    transform: translateY(-1px);
  }

  .all-done-banner {
    display: none;
    text-align: center;
    padding: 20px;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--veggie);
    animation: pop 0.4s cubic-bezier(.4,0,.2,1);
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <span class="header-emoji">🛒</span>
    <h1>ביקור באושר עד היום</h1>
    <p class="subtitle" id="dateLabel"></p>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <p class="progress-label" id="progressLabel">0 מתוך 0 פריטים</p>
  </header>

  <!-- ירקות ופירות -->
  <div class="category veggie">
    <div class="cat-header">
      <div class="cat-icon">🥦</div>
      <span class="cat-title">ירקות ופירות</span>
      <span class="cat-badge" id="badge-veggie">0/0</span>
    </div>
    <div class="item-list" id="list-veggie">
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">סלרי</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">בצל</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">תפוחי אדמה קטנים × 4</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">ירק שומר × 1</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">גמבות בכל מיני צבעים</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">ירקות לסלט — מלפפון, עגבניה, גמבה, בצל סגול, לימון</span></label>
    </div>
  </div>

  <!-- קפואים -->
  <div class="category frozen">
    <div class="cat-header">
      <div class="cat-icon">❄️</div>
      <span class="cat-title">קפואים</span>
      <span class="cat-badge" id="badge-frozen">0/0</span>
    </div>
    <div class="item-list" id="list-frozen">
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">אפונה קפואה</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">שעועית עדינה קפואה</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">טבעול נקניקיות קפוא</span></label>
    </div>
  </div>

  <!-- שתייה -->
  <div class="category drinks">
    <div class="cat-header">
      <div class="cat-icon">🥤</div>
      <span class="cat-title">שתייה</span>
      <span class="cat-badge" id="badge-drinks">0/0</span>
    </div>
    <div class="item-list" id="list-drinks">
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">שישיית זירו</span></label>
    </div>
  </div>

  <!-- קירור -->
  <div class="category dairy">
    <div class="cat-header">
      <div class="cat-icon">🧀</div>
      <span class="cat-title">קירור</span>
      <span class="cat-badge" id="badge-dairy">0/0</span>
    </div>
    <div class="item-list" id="list-dairy">
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">מוצרלה מגוררת</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">גבינה צהובה</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">בשר טרי לתבשיל</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">מעדן חלבון שכבות</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">נקניקיות בשריות</span></label>
    </div>
  </div>

  <!-- חטיפים -->
  <div class="category snacks">
    <div class="cat-header">
      <div class="cat-icon">🍿</div>
      <span class="cat-title">חטיפים</span>
      <span class="cat-badge" id="badge-snacks">0/0</span>
    </div>
    <div class="item-list" id="list-snacks">
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">פופקורן למיקרו</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">במבה, תפוציפס ועוד</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">חבילת מצות גדולה לפסח</span></label>
    </div>
  </div>

  <!-- ניקיון -->
  <div class="category clean">
    <div class="cat-header">
      <div class="cat-icon">🧺</div>
      <span class="cat-title">ניקיון</span>
      <span class="cat-badge" id="badge-clean">0/0</span>
    </div>
    <div class="item-list" id="list-clean">
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">נוזל כביסה כביסכל רוז</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">כפפות חד פעמיות</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">ספוג הפלא</span></label>
    </div>
  </div>

  <!-- אחר -->
  <div class="category other">
    <div class="cat-header">
      <div class="cat-icon">🛍️</div>
      <span class="cat-title">אחר</span>
      <span class="cat-badge" id="badge-other">0/0</span>
    </div>
    <div class="item-list" id="list-other">
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">פסטה — סוגים שונים</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">שמן קנולה</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">שמן זית</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">רוטב פיצה אסם</span></label>
      <label class="item"><input type="checkbox"><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">אבקת מרק עוף</span></label>
    </div>
  </div>

  <div class="all-done-banner" id="allDone">🎉 קניות הושלמו! כל הכבוד!</div>
  <button class="reset-btn" onclick="resetAll()">אפס רשימה</button>
</div>

<script>
  const categories = ['veggie','frozen','drinks','dairy','snacks','clean','other'];

  function updateBadge(catId) {
    const list = document.getElementById('list-' + catId);
    const items = list.querySelectorAll('.item');
    const done = list.querySelectorAll('.item.done').length;
    document.getElementById('badge-' + catId).textContent = done + '/' + items.length;
  }

  function updateProgress() {
    const all = document.querySelectorAll('.item');
    const done = document.querySelectorAll('.item.done');
    const pct = all.length ? Math.round(done.length / all.length * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = done.length + ' מתוך ' + all.length + ' פריטים';
    document.getElementById('allDone').style.display = (done.length === all.length && all.length > 0) ? 'block' : 'none';
  }

  function initItems() {
    document.querySelectorAll('.item').forEach(item => {
      const cb = item.querySelector('input[type="checkbox"]');
      item.addEventListener('click', () => {
        cb.checked = !cb.checked;
        item.classList.toggle('done', cb.checked);
        const catId = item.closest('.category').className.split(' ').find(c => categories.includes(c));
        updateBadge(catId);
        updateProgress();
      });
    });
    categories.forEach(updateBadge);
    updateProgress();
  }

  function resetAll() {
    document.querySelectorAll('.item').forEach(item => {
      item.classList.remove('done');
      item.querySelector('input').checked = false;
    });
    categories.forEach(updateBadge);
    updateProgress();
  }

  // Date
  const now = new Date();
  document.getElementById('dateLabel').textContent = now.toLocaleDateString('he-IL', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  initItems();
</script>
</body>
</html>
