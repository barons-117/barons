<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ביקור באושר עד היום</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --paper: #fffef9; --ink: #2a2118; --muted: #9e8e78; --line: #ede8df;
    --veggie: #4a7c59; --veggie-bg: #eef6f0;
    --frozen: #3a6f8f; --frozen-bg: #e8f3f9;
    --drinks: #8b5e3c; --drinks-bg: #faf0e8;
    --dairy:  #c0884a; --dairy-bg:  #fdf5e8;
    --snacks: #b85252; --snacks-bg: #fdf0f0;
    --clean:  #6b5fa5; --clean-bg:  #f2f0fa;
    --other:  #5a7080; --other-bg:  #eef2f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); font-family: 'Heebo', sans-serif; color: var(--ink);
    min-height: 100vh; padding: 24px 16px 60px;
    background-image: radial-gradient(ellipse at 80% 10%, rgba(74,124,89,0.06) 0%, transparent 50%),
                      radial-gradient(ellipse at 20% 90%, rgba(139,94,60,0.06) 0%, transparent 50%);
  }
  header { text-align: center; padding: 32px 0 28px; }
  .header-emoji { font-size: 48px; display: block; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  h1 { font-size: 2rem; font-weight: 900; letter-spacing: -1px; line-height: 1.2; }
  .subtitle { font-size: 0.9rem; color: var(--muted); margin-top: 6px; font-weight: 300; }
  .progress-bar-wrap { max-width: 320px; margin: 18px auto 0; background: var(--line); border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--veggie), var(--dairy)); border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); width: 0%; }
  .progress-label { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 6px; font-weight: 500; }
  .sync-status { font-size: 0.75rem; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: background 0.3s; flex-shrink: 0; }
  .sync-dot.connected { background: #4a7c59; box-shadow: 0 0 0 2px rgba(74,124,89,0.2); }
  .sync-dot.syncing { background: #c0884a; animation: pulse 0.8s ease-in-out infinite; }
  .sync-text { color: var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .container { max-width: 560px; margin: 0 auto; }
  .category { background: var(--paper); border-radius: 20px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04); transition: box-shadow 0.2s; }
  .category:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .cat-header { display: flex; align-items: center; gap: 10px; padding: 16px 20px 14px; border-bottom: 1.5px solid var(--line); }
  .cat-icon { font-size: 22px; width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cat-title { font-size: 1rem; font-weight: 700; flex: 1; }
  .cat-badge { font-size: 0.72rem; font-weight: 600; padding: 3px 9px; border-radius: 99px; opacity: 0.85; }
  .veggie .cat-icon{background:var(--veggie-bg);} .veggie .cat-title{color:var(--veggie);} .veggie .cat-badge{background:var(--veggie-bg);color:var(--veggie);}
  .frozen .cat-icon{background:var(--frozen-bg);} .frozen .cat-title{color:var(--frozen);} .frozen .cat-badge{background:var(--frozen-bg);color:var(--frozen);}
  .drinks .cat-icon{background:var(--drinks-bg);} .drinks .cat-title{color:var(--drinks);} .drinks .cat-badge{background:var(--drinks-bg);color:var(--drinks);}
  .dairy  .cat-icon{background:var(--dairy-bg);}  .dairy  .cat-title{color:var(--dairy);}  .dairy  .cat-badge{background:var(--dairy-bg); color:var(--dairy);}
  .snacks .cat-icon{background:var(--snacks-bg);} .snacks .cat-title{color:var(--snacks);} .snacks .cat-badge{background:var(--snacks-bg);color:var(--snacks);}
  .clean  .cat-icon{background:var(--clean-bg);}  .clean  .cat-title{color:var(--clean);}  .clean  .cat-badge{background:var(--clean-bg); color:var(--clean);}
  .other  .cat-icon{background:var(--other-bg);}  .other  .cat-title{color:var(--other);}  .other  .cat-badge{background:var(--other-bg); color:var(--other);}
  .item-list { padding: 8px 0; min-height: 4px; }
  .item { display: flex; align-items: center; gap: 14px; padding: 11px 20px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid transparent; user-select: none; }
  .item:not(:last-child) { border-bottom-color: var(--line); }
  .item:hover { background: rgba(0,0,0,0.02); }
  .item input[type="checkbox"] { display: none; }
  .checkmark { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(.4,0,.2,1); background: white; }
  .checkmark svg { width: 12px; height: 12px; opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(.4,0,.2,1); }
  .item.done .checkmark svg { opacity: 1; transform: scale(1); }
  .item-text { font-size: 0.95rem; font-weight: 400; color: var(--ink); transition: all 0.25s; line-height: 1.4; flex: 1; }
  .item.done .item-text { color: var(--muted); text-decoration: line-through; text-decoration-thickness: 1.5px; }
  .veggie .item.done .checkmark{background:var(--veggie);border-color:var(--veggie);}
  .frozen .item.done .checkmark{background:var(--frozen);border-color:var(--frozen);}
  .drinks .item.done .checkmark{background:var(--drinks);border-color:var(--drinks);}
  .dairy  .item.done .checkmark{background:var(--dairy); border-color:var(--dairy);}
  .snacks .item.done .checkmark{background:var(--snacks);border-color:var(--snacks);}
  .clean  .item.done .checkmark{background:var(--clean); border-color:var(--clean);}
  .other  .item.done .checkmark{background:var(--other); border-color:var(--other);}
  .add-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px 12px; border-top: 1.5px dashed var(--line); }
  .add-input { flex: 1; border: none; background: transparent; font-family: 'Heebo', sans-serif; font-size: 0.9rem; color: var(--ink); outline: none; direction: rtl; }
  .add-input::placeholder { color: var(--muted); }
  .add-btn { width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.15s; opacity: 0.55; background: var(--line); color: var(--ink); flex-shrink: 0; }
  .add-btn:hover { opacity: 1; transform: scale(1.1); }
  .all-done-banner { display: none; text-align: center; padding: 20px; font-size: 1.1rem; font-weight: 700; color: var(--veggie); animation: pop 0.4s cubic-bezier(.4,0,.2,1); }
  @keyframes pop { 0%{transform:scale(0.8);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .reset-btn { display: block; margin: 24px auto 0; padding: 12px 32px; border: 2px solid var(--line); border-radius: 99px; background: white; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--muted); color: var(--ink); transform: translateY(-1px); }
  #loadingOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; transition: opacity 0.5s; }
  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--line); border-top-color: var(--veggie); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:0.9rem;">מתחבר לרשימה...</p>
</div>

<div class="container">
  <header>
    <span class="header-emoji">🛒</span>
    <h1>ביקור באושר עד היום</h1>
    <p class="subtitle" id="dateLabel"></p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <p class="progress-label" id="progressLabel">טוען...</p>
    <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span class="sync-text" id="syncText">מתחבר...</span></div>
  </header>

  <div class="category veggie" data-cat="veggie">
    <div class="cat-header"><div class="cat-icon">🥦</div><span class="cat-title">ירקות ופירות</span><span class="cat-badge" id="badge-veggie">0/0</span></div>
    <div class="item-list" id="list-veggie"></div>
    <div class="add-row"><input class="add-input" type="text" placeholder="+ הוסף פריט..."><button class="add-btn" onclick="addItem(this)">＋</button></div>
  </div>

  <div class="category frozen" data-cat="frozen">
    <div class="cat-header"><div class="cat-icon">❄️</div><span class="cat-title">קפואים</span><span class="cat-badge" id="badge-frozen">0/0</span></div>
    <div class="item-list" id="list-frozen"></div>
    <div class="add-row"><input class="add-input" type="text" placeholder="+ הוסף פריט..."><button class="add-btn" onclick="addItem(this)">＋</button></div>
  </div>

  <div class="category drinks" data-cat="drinks">
    <div class="cat-header"><div class="cat-icon">🥤</div><span class="cat-title">שתייה</span><span class="cat-badge" id="badge-drinks">0/0</span></div>
    <div class="item-list" id="list-drinks"></div>
    <div class="add-row"><input class="add-input" type="text" placeholder="+ הוסף פריט..."><button class="add-btn" onclick="addItem(this)">＋</button></div>
  </div>

  <div class="category dairy" data-cat="dairy">
    <div class="cat-header"><div class="cat-icon">🧀</div><span class="cat-title">קירור</span><span class="cat-badge" id="badge-dairy">0/0</span></div>
    <div class="item-list" id="list-dairy"></div>
    <div class="add-row"><input class="add-input" type="text" placeholder="+ הוסף פריט..."><button class="add-btn" onclick="addItem(this)">＋</button></div>
  </div>

  <div class="category snacks" data-cat="snacks">
    <div class="cat-header"><div class="cat-icon">🍿</div><span class="cat-title">חטיפים</span><span class="cat-badge" id="badge-snacks">0/0</span></div>
    <div class="item-list" id="list-snacks"></div>
    <div class="add-row"><input class="add-input" type="text" placeholder="+ הוסף פריט..."><button class="add-btn" onclick="addItem(this)">＋</button></div>
  </div>

  <div class="category clean" data-cat="clean">
    <div class="cat-header"><div class="cat-icon">🧺</div><span class="cat-title">ניקיון</span><span class="cat-badge" id="badge-clean">0/0</span></div>
    <div class="item-list" id="list-clean"></div>
    <div class="add-row"><input class="add-input" type="text" placeholder="+ הוסף פריט..."><button class="add-btn" onclick="addItem(this)">＋</button></div>
  </div>

  <div class="category other" data-cat="other">
    <div class="cat-header"><div class="cat-icon">🛍️</div><span class="cat-title">אחר</span><span class="cat-badge" id="badge-other">0/0</span></div>
    <div class="item-list" id="list-other"></div>
    <div class="add-row"><input class="add-input" type="text" placeholder="+ הוסף פריט..."><button class="add-btn" onclick="addItem(this)">＋</button></div>
  </div>

  <div class="all-done-banner" id="allDone">🎉 קניות הושלמו! כל הכבוד!</div>
  <button class="reset-btn" onclick="resetAll()">אפס סימונים</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCNkfifRX7zgHcIXmAuB0HSSzCfCzsFKjk",
    authDomain: "shopping-list-855d8.firebaseapp.com",
    databaseURL: "https://shopping-list-855d8-default-rtdb.firebaseio.com",
    projectId: "shopping-list-855d8",
    storageBucket: "shopping-list-855d8.firebasestorage.app",
    messagingSenderId: "467214739172",
    appId: "1:467214739172:web:1c1e46e9072352197f2ef1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const listRef = ref(db, 'shoppingList');
  const categories = ['veggie','frozen','drinks','dairy','snacks','clean','other'];

  const defaultItems = {
    veggie: ['סלרי','בצל','תפוחי אדמה קטנים × 4','ירק שומר × 1','גמבות בכל מיני צבעים','ירקות לסלט — מלפפון, עגבניה, גמבה, בצל סגול, לימון'],
    frozen: ['אפונה קפואה','שעועית עדינה קפואה','טבעול נקניקיות קפוא'],
    drinks: ['שישיית זירו'],
    dairy:  ['מוצרלה מגוררת','גבינה צהובה','בשר טרי לתבשיל','מעדן חלבון שכבות','נקניקיות בשריות'],
    snacks: ['פופקורן למיקרו','במבה, תפוציפס ועוד','חבילת מצות גדולה לפסח'],
    clean:  ['נוזל כביסה כביסכל רוז','כפפות חד פעמיות','ספוג הפלא'],
    other:  ['פסטה — סוגים שונים','שמן קנולה','שמן זית','רוטב פיצה אסם','אבקת מרק עוף']
  };

  const syncDot  = document.getElementById('syncDot');
  const syncText = document.getElementById('syncText');

  function setSyncing() { syncDot.className = 'sync-dot syncing'; syncText.textContent = 'מסנכרן...'; }
  function setConnected() { syncDot.className = 'sync-dot connected'; syncText.textContent = 'מסונכרן ✓'; }

  // Listen for changes
  onValue(listRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      // First run — write defaults
      const toWrite = {};
      for (const cat of categories) {
        toWrite[cat] = {};
        defaultItems[cat].forEach((text, i) => {
          toWrite[cat]['item_' + String(i).padStart(3,'0')] = { text, done: false };
        });
      }
      set(listRef, toWrite);
      return;
    }
    renderAll(data);
    document.getElementById('loadingOverlay').classList.add('hidden');
    setConnected();
  });

  function renderAll(data) {
    for (const cat of categories) renderCategory(cat, data[cat] || {});
    updateProgress();
  }

  function renderCategory(cat, catData) {
    const list = document.getElementById('list-' + cat);
    list.innerHTML = '';
    Object.keys(catData).sort().forEach(key => {
      list.appendChild(createItemEl(catData[key].text, catData[key].done, cat, key));
    });
    updateBadge(cat);
  }

  function createItemEl(text, done, cat, key) {
    const label = document.createElement('label');
    label.className = 'item' + (done ? ' done' : '');
    label.innerHTML = `<input type="checkbox" ${done?'checked':''}><span class="checkmark"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="item-text">${text}</span>`;
    label.addEventListener('click', () => {
      const newDone = !label.classList.contains('done');
      setSyncing();
      update(ref(db, `shoppingList/${cat}/${key}`), { done: newDone }).then(setConnected);
    });
    return label;
  }

  function updateBadge(cat) {
    const list = document.getElementById('list-' + cat);
    const all  = list.querySelectorAll('.item').length;
    const done = list.querySelectorAll('.item.done').length;
    document.getElementById('badge-' + cat).textContent = done + '/' + all;
  }

  function updateProgress() {
    const all  = document.querySelectorAll('.item').length;
    const done = document.querySelectorAll('.item.done').length;
    const pct  = all ? Math.round(done / all * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = done + ' מתוך ' + all + ' פריטים';
    document.getElementById('allDone').style.display = (done === all && all > 0) ? 'block' : 'none';
  }

  window.addItem = function(btn) {
    const input = btn.previousElementSibling;
    const text  = input.value.trim();
    if (!text) return;
    const cat = btn.closest('.category').dataset.cat;
    setSyncing();
    push(ref(db, 'shoppingList/' + cat), { text, done: false }).then(setConnected);
    input.value = '';
    input.focus();
  };

  document.querySelectorAll('.add-input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.addItem(inp.nextElementSibling); });
  });

  window.resetAll = async function() {
    if (!confirm('לאפס את כל הסימונים?')) return;
    setSyncing();
    const snap = await get(listRef);
    const data = snap.val();
    if (!data) return;
    const updates = {};
    for (const cat of categories) {
      if (data[cat]) Object.keys(data[cat]).forEach(k => { updates[`${cat}/${k}/done`] = false; });
    }
    update(listRef, updates).then(setConnected);
  };

  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('he-IL', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
</script>
</body>
</html>
